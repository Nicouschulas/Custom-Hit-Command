name: CustomHitCommand
version: '${project.version}'
main: de.nicouschulas.customhitcommand.CustomHitCommand
api-version: '26.1.2'
author: Nicouschulas
description: Executes a configurable command when hitting another player with a configurable item group or a single item!

permissions:
  customhitcommand.admin:
    description: Parent permission for all administrative commands and usage.
    default: op
    children:
      customhitcommand.reload: true
      customhitcommand.sethititem: true
      customhitcommand.update: true
      customhitcommand.use: true

  customhitcommand.use:
    description: Allows a player to trigger the configured command by hitting someone.
    default: true

  customhitcommand.reload:
    description: Reloads the Custom Hit Command plugin configuration.
    default: op

  customhitcommand.sethititem:
    description: Allows a player to mark an item as the custom hit item.
    default: op

  customhitcommand.update:
    description: Allows a player to receive in-game update notifications.
    default: op